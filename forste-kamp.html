// ============================================================
// Image slug bridge. boxing-dasspapir-prank.jpg does not exist
// on disk yet. Reuse boxing-title-gloves.jpg as the same bytes
// per v4 IC-06 (file recropped for this purpose).
// ============================================================
const imageSlugBridge = {
  "boxing-dasspapir-prank.jpg": "boxing-title-gloves.jpg"
};
function resolveImage(slug) {
  const file = imageSlugBridge[slug] || slug;
  return "img/" + file;
}

// ============================================================
// Renderer. Handles block types: hero, paragraph, heading,
// image, video, tagline-statement, tagline-code, pullquote, footer.
// Bilingual via data-lang.
// ============================================================
let currentLang = "no";

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function renderPost(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.body.setAttribute("data-lang", lang);
  const container = document.getElementById("blog-content");
  let html = "";

  postForsteKampContent.forEach((block, i) => {
    switch (block.type) {

      case "hero": {
        const alt = lang === "no" ? block.alt_no : block.alt_en;
        const cap = lang === "no" ? block.caption_no : block.caption_en;
        const dateMeta = lang === "no" ? "21. februar 2026" : "21 February 2026";
        const kicker = "Bod\u00F8 Spektrum / Arctic Boxing";
        const title = lang === "no" ? "f\u00F8rste kamp." : "first fight.";
        html += `<div class="fade-in">
          <p class="article-meta">${escapeHtml(kicker)}</p>
          <h1 class="article-title">${escapeHtml(title)}</h1>
          <p class="article-meta" style="margin-top: 8px;">${escapeHtml(dateMeta)}</p>
        </div>`;
        html += `<figure class="article-header-image fade-in">
          <img src="${resolveImage(block.image)}" alt="${escapeHtml(alt)}" loading="eager">
          <figcaption>${escapeHtml(cap)}</figcaption>
        </figure>`;
        html += `<div class="article-body">`;
        break;
      }

      case "paragraph": {
        const txt = block[lang];
        html += `<div class="fade-in"><p>${escapeHtml(txt)}</p></div>`;
        break;
      }

      case "heading": {
        const txt = block[lang];
        html += `<div class="fade-in"><p class="section-label">${escapeHtml(txt)}</p></div>`;
        break;
      }

      case "image": {
        const alt = lang === "no" ? block.alt_no : block.alt_en;
        const cap = lang === "no" ? block.caption_no : block.caption_en;
        html += `<figure class="article-image fade-in">
          <img src="${resolveImage(block.image)}" alt="${escapeHtml(alt)}" loading="lazy">`;
        if (cap) {
          html += `<figcaption>${escapeHtml(cap)}</figcaption>`;
        }
        html += `</figure>`;
        break;
      }

      case "video": {
        const cap = lang === "no" ? block.caption_no : block.caption_en;
        html += `<figure class="article-image fade-in">
          <video src="${resolveImage(block.video)}" poster="${block.poster ? resolveImage(block.poster) : ''}" controls playsinline preload="metadata" style="width:100%;max-height:70vh;border-radius:4px;display:block;"></video>`;
        if (cap) {
          html += `<figcaption>${escapeHtml(cap)}</figcaption>`;
        }
        html += `</figure>`;
        break;
      }

      case "tagline":
      case "tagline-statement": {
        const txt = block[lang];
        html += `<div class="fade-in"><p class="tagline-statement">${escapeHtml(txt)}</p></div>`;
        break;
      }

      case "tagline-code": {
        const txt = block[lang];
        html += `<div class="fade-in"><p class="tagline-code">${escapeHtml(txt)}</p></div>`;
        break;
      }

      case "pullquote": {
        const txt = block[lang];
        html += `<div class="fade-in"><p class="pull-quote">${escapeHtml(txt)}</p></div>`;
        break;
      }

      case "footer": {
        const txt = block[lang];
        html += `<div class="post-footer fade-in">${escapeHtml(txt)}</div>`;
        html += `</div>`; // close .article-body

        // post nav — link back to blog
        const navLabel = lang === "no" ? "les også" : "also read";
        const navTitle = lang === "no" ? "pakken kom." : "the order arrived.";
        const navDate = "April 2026";
        html += `<div class="post-nav fade-in" role="navigation" aria-label="${lang === 'no' ? 'Andre innlegg' : 'Other posts'}">
          <a href="index.html#pakken-kom" class="post-nav-link">
            <span class="post-nav-label">${navLabel}</span>
            <span class="post-nav-title">${navTitle}</span>
            <span class="post-nav-date">${navDate}</span>
          </a>
        </div>`;
        break;
      }
    }
  });

  container.innerHTML = html;

  // Update sidebar promo CTA language
  const sidebarCta = document.querySelector('[data-sidebar-cta]');
  if (sidebarCta) {
    sidebarCta.innerHTML = (lang === 'no' ? 'Se mer' : 'See more') + ' <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>';
  }

  // intersection observer for fade-in
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  container.querySelectorAll(".fade-in").forEach(el => observer.observe(el));
}

// language toggle wiring
const langBtns = document.querySelectorAll("[data-lang-btn]");
langBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    const lang = btn.getAttribute("data-lang-btn");
    langBtns.forEach(b => b.classList.remove("active"));
    langBtns.forEach(b => {
      if (b.getAttribute("data-lang-btn") === lang) b.classList.add("active");
    });
    renderPost(lang);
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
});

// nav hide on scroll down, show on up
let lastScroll = 0;
const navEl = document.querySelector("nav");
window.addEventListener("scroll", () => {
  const current = window.scrollY;
  if (current > lastScroll && current > 100) {
    navEl.style.transform = "translateY(-100%)";
  } else {
    navEl.style.transform = "translateY(0)";
  }
  lastScroll = current;
}, { passive: true });

// boot
renderPost("no");
</script>
