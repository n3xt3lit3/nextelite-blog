name: Test
on:
  pull_request:
  push:
    branches: [main, astro-migrate]
jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'astro-app/pnpm-lock.yaml'
      - run: cd astro-app && pnpm install --frozen-lockfile
      - run: cd astro-app && pnpm exec playwright install chromium --with-deps
      - run: cd astro-app && pnpm build
      - run: cd astro-app && pnpm exec playwright test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: astro-app/playwright-report/
