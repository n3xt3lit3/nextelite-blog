<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
// hash-redirect — gamle lenker som https://nextelite.no/#fotball
// peker nå til egne sider. Slug-kartet genereres av build.py.
(function () {
  var slugs = {{REDIRECT_SLUGS}};
  var s = location.hash.replace('#', '');
  if (s && slugs[s]) { location.replace(s + '.html'); }
})();
</script>
<meta name="description" content="nextelite. boxing, protocol, art. en blogg fra vesteralen.">
<meta name="author" content="Neminee">
<link rel="canonical" href="https://nextelite.no/">
<meta property="og:title" content="{{OG_TITLE}}">
<meta property="og:description" content="{{OG_DESCRIPTION}}">
<meta property="og:image" content="{{OG_IMAGE}}">
{{OG_IMAGE_EXTRA}}<meta property="og:url" content="https://nextelite.no/#{{LATEST_SLUG}}">
<meta property="og:type" content="article">
<meta property="og:locale" content="nb_NO">
<meta property="og:site_name" content="nextelite">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{OG_TITLE}}">
<meta name="twitter:description" content="{{OG_DESCRIPTION}}">
<meta name="twitter:image" content="{{OG_IMAGE}}">
<title>nextelite | blog by nemine steffensen</title>
<link rel="alternate" type="application/rss+xml" title="nextelite" href="https://nextelite.no/feed.xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<!-- generert av build.py — rediger content/posts/, ikke denne fila -->
<link rel="stylesheet" href="assets/blog.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Blog",
  "name": "nextelite",
  "url": "https://nextelite.no",
  "description": "nextelite. boxing, protocol, art. en blogg fra vesteralen.",
  "inLanguage": ["nb", "en"],
  "author": {
    "@type": "Person",
    "name": "Neminee",
    "url": "https://nextelite.no"
  },
  "publisher": {
    "@type": "Organization",
    "name": "nextelite",
    "url": "https://nextelite.no"
  }
}
</script>
</head>
<body data-lang="no" class="has-marquee">

{{MARQUEE}}

<!-- NAV -->
{{NAV}}

<main>
  <article id="blog-content">{{CONTENT}}</article>
</main>

<div class="promo-rail">
<!-- sidebar promo — nextelite boxing -->
<aside class="sidebar-promo" aria-label="NextElite training">
  <a href="https://nextelite.no/boxing/" target="_blank" rel="noopener" data-boxing-link>
    <div class="promo-top">
      <span class="promo-word">gloves on</span>
      <span class="promo-pill">nextelite</span>
    </div>
    <img class="promo-img" src="img/boxing-bodo-ring-purple.jpg" alt="NextElite boksering i Bodo" loading="lazy">
  </a>
</aside>

{{SIDEBAR_PLAYLIST}}
</div>

<footer>
  <div class="footer-logo">nextelite</div>
</footer>

<script src="assets/blog.js" defer></script>
</body>
</html>
