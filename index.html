let currentPostIdx = 0;

function loadPost(slug) {
  const idx = postsIndex.findIndex(p => p.slug === slug);
  if (idx < 0) return false;
  // external page — navigate directly
  if (postsIndex[idx].href) {
    window.location.href = postsIndex[idx].href;
    return false;
  }
  currentPostIdx = idx;
  blogContent = postsIndex[idx].content;
  if (location.hash !== '#' + slug) {
    history.replaceState(null, '', '#' + slug);
  }
  renderBlog(currentLang);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  return false;
}

window.addEventListener('hashchange', () => {
  const slug = location.hash.replace('#', '') || 'forste-kamp';
  loadPost(slug);
});

// RENDERER — Builds HTML from content array
// ═══════════════════════════════════════

let currentLang = 'no';

function renderBlog(lang) {
  currentLang = lang;
  const container = document.getElementById('blog-content');
  let html = '';

  blogContent.forEach((block, i) => {
    switch (block.type) {

      case 'header':
        html += `<div class="fade-in">
          <p class="article-meta">${block.meta[lang]}</p>
          <h1 class="article-title">${block.title[lang]}</h1>
          <p class="article-meta" style="margin-top: 8px;">${block.date[lang]}</p>
        </div>`;
        if (block.headerImage) {
          html += `<figure class="article-header-image fade-in">
            <img src="${block.headerImage.src}" alt="${block.headerImage.alt[lang]}" loading="eager">
          </figure>`;
        }
        html += `<div class="article-body">`;
        break;

      case 'paragraph':
        html += `<div class="fade-in">
          <p>${block[lang]}</p>
        </div>`;
        break;

      case 'disclosure':
        html += `<div class="fade-in">
          <blockquote class="affiliate-disclosure">${block[lang]}</blockquote>
        </div>`;
        break;

      case 'tagline-code':
        html += `<div class="fade-in">
          <p class="tagline tagline-code">${block[lang]}</p>
        </div>`;
        break;

      case 'tagline-statement':
        html += `<div class="fade-in">
          <p class="tagline-statement">${block[lang]}</p>
        </div>`;
        break;

      case 'section-label':
        html += `<div class="fade-in">
          <p class="section-label">${block[lang]}</p>
        </div>`;
        break;

      case 'pull-quote':
        html += `<div class="fade-in">
          <p class="pull-quote">${block[lang]}</p>
        </div>`;
        break;

      case 'image':
        html += `<figure class="article-image fade-in">
          <img src="${block.src}" alt="${block.alt[lang]}" loading="lazy">`;
        if (block.caption) {
          html += `<figcaption>${block.caption[lang]}</figcaption>`;
        }
        html += `</figure>`;
        break;

      // l1ft0ff // mission voyager // video block added 260411
      case 'video': {
        const posterAttr = block.poster ? ` poster="${block.poster}"` : '';
        const mutedAttr = block.audio === false ? ' muted' : '';
        const altText = block.alt && block.alt[lang] ? block.alt[lang] : '';
        html += `<figure class="article-image fade-in">
          <video src="${block.src}"${posterAttr} controls preload="metadata" playsinline${mutedAttr} aria-label="${altText}"></video>`;
        if (block.caption) {
          html += `<figcaption>${block.caption[lang]}</figcaption>`;
        }
        html += `</figure>`;
        break;
      }

      case 'image-pair':
        html += `<figure class="image-pair fade-in">`;
        block.images.forEach(img => {
          html += `<img src="${img.src}" alt="${img.alt[lang]}" loading="lazy">`;
        });
        if (block.caption) {
          html += `<figcaption>${block.caption[lang]}</figcaption>`;
        }
        html += `</figure>`;
        break;

      case 'inline-promo-kennel':
        html += `<div class="inline-promo fade-in">
          <a href="https://n3xt3lit3.github.io/nextelite-kennel/" target="_blank" rel="noopener">
            <img class="inline-promo-img" src="img/hundehus-exterior-1.jpg" alt="${lang === 'no' ? 'Hundehus' : 'Dog Kennel'}" loading="lazy">
            <div class="inline-promo-body">
              <div class="inline-promo-label">STEFFENSEN</div>
              <div class="inline-promo-sub">${lang === 'no' ? 'håndbygget hundehus' : 'handbuilt kennel'}</div>
            </div>
          </a>
        </div>`;
        break;

      case 'inline-promo':
        html += `<div class="inline-promo fade-in">
          <a href="https://n3xt3lit3.github.io/nextelite-boxing/?lang=${lang}" target="_blank" rel="noopener" data-boxing-link>
            <img class="inline-promo-img" src="img/gym-6380.jpg" alt="NextElite" loading="lazy">
            <div class="inline-promo-body">
              <div class="inline-promo-label">NEXTELITE</div>
              <div class="inline-promo-sub">gloves on</div>
            </div>
          </a>
        </div>`;
        break;

      case 'sign-off':
        html += `<div class="fade-in">
          <p class="sign-off">&lt;333</p>
        </div>`;
        // Close .article-body
        html += `</div>`;
        break;
    }
  });

  // ─── POST NAV (cross-link to other post) ───
  const otherIdx = (currentPostIdx + 1) % postsIndex.length;
  const other = postsIndex[otherIdx];
  const navLabel = lang === 'no' ? 'les ogs\u00E5' : 'also read';
  const otherHref = other.href ? other.href : `#${other.slug}`;
  const otherOnclick = other.href ? '' : ` onclick="return loadPost('${other.slug}');"`;
  html += `<div class="post-nav fade-in" role="navigation" aria-label="${lang === 'no' ? 'Andre innlegg' : 'Other posts'}">
    <a href="${otherHref}" class="post-nav-link"${otherOnclick}>
      <span class="post-nav-label">${navLabel}</span>
      <span class="post-nav-title">${other.title[lang]}</span>
      <span class="post-nav-date">${other.date[lang]}</span>
    </a>
  </div>`;

  container.innerHTML = html;

  // Update sidebar promo CTA language
  const sidebarCta = document.querySelector('[data-sidebar-cta]');
  if (sidebarCta) {
    sidebarCta.innerHTML = (lang === 'no' ? 'Se mer' : 'See more') + ' <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>';
  }

  // Update all boxing promo links with current language — Mission Babel
  document.querySelectorAll('[data-boxing-link]').forEach(function(link) {
    link.href = 'https://n3xt3lit3.github.io/nextelite-boxing/?lang=' + lang;
  });

  // Re-attach intersection observer to new elements
  container.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

// ═══════════════════════════════════════
// INTERSECTION OBSERVER — fade-in on scroll
// ═══════════════════════════════════════
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, {
  threshold: 0.1,
  rootMargin: '0px 0px -40px 0px'
});

// ═══════════════════════════════════════
// LANGUAGE TOGGLE
// ═══════════════════════════════════════
const langBtns = document.querySelectorAll('[data-lang-btn]');

langBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.getAttribute('data-lang-btn');
    document.body.setAttribute('data-lang', lang);

    langBtns.forEach(b => {
      b.classList.remove('active');
      if (b.getAttribute('data-lang-btn') === lang) b.classList.add('active');
    });

    // Update html lang attribute
    document.documentElement.lang = lang === 'no' ? 'no' : 'en';

    // Re-render content in new language
    renderBlog(lang);

    // Scroll to top on language switch
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// ═══════════════════════════════════════
// NAV HIDE ON SCROLL DOWN, SHOW ON UP
// ═══════════════════════════════════════
let lastScroll = 0;
const navEl = document.querySelector('nav');

window.addEventListener('scroll', () => {
  const current = window.scrollY;
  if (current > lastScroll && current > 100) {
    navEl.style.transform = 'translateY(-100%)';
  } else {
    navEl.style.transform = 'translateY(0)';
  }
  lastScroll = current;
}, { passive: true });

// ═══════════════════════════════════════
// INITIAL RENDER
// ═══════════════════════════════════════
(function initialRender() {
  const initSlug = location.hash.replace('#', '');
  if (initSlug) {
    const idx = postsIndex.findIndex(p => p.slug === initSlug);
    if (idx >= 0) {
      // external page — redirect
      if (postsIndex[idx].href) {
        window.location.href = postsIndex[idx].href;
        return;
      }
      currentPostIdx = idx;
      blogContent = postsIndex[idx].content;
    }
  } else {
    // No hash — default to first post
    const first = postsIndex[0];
    if (first.href) {
      window.location.href = first.href;
      return;
    }
    currentPostIdx = 0;
    blogContent = first.content;
  }
  renderBlog('no');
})();

</script>

</body>
